name: Deploy Hugo Site

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'layouts/**'
      - 'static/**'
      - 'hugo.toml'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-hugo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
