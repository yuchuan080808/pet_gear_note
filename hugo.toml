baseURL = 'https://petgearnotes.com/'
languageCode = 'en-us'
title = 'Pet Gear Note'
theme = 'PaperMod'
enableRobotsTXT = true

[params]
env = 'production'
description = 'Comprehensive reviews, buying guides, and expert recommendations for dog and cat supplies. Find the best pet gear and avoid buyer regret.'
keywords = ['pet supplies', 'dog gear', 'cat accessories', 'pet product reviews', 'best pet products']
author = 'Pet Gear Note'
defaultTheme = "auto"
mainSections = ["cats", "dogs"]
disableSpecial1stPost = true

